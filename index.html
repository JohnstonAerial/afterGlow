<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Afterglow — Sky Forecast</title>
<meta name="description" content="Sunrise and sunset color-quality forecasts for photographers and pilots.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22%231B1F3B%22/><circle cx=%2250%22 cy=%2265%22 r=%2226%22 fill=%22%23F2B84B%22/></svg>">
<style>
  @font-face {
    font-family: 'Fraunces';
    src: local('Fraunces');
  }
  :root{
    --ink: #14172c;
    --ink-2: #1B1F3B;
    --ember: #FF6B35;
    --rose: #E8517A;
    --gold: #F2B84B;
    --sand: #F5E6D3;
    --slate: #8892a8;
    --slate-dim: #565d78;
    --line: rgba(245,230,211,0.14);
    --card: rgba(245,230,211,0.05);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: radial-gradient(120% 90% at 50% -10%, #262b4d 0%, var(--ink) 45%, #0d0f1e 100%);
    color: var(--sand);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    padding-bottom: 60px;
  }
  a { color: inherit; }
  .wrap{ max-width: 720px; margin: 0 auto; padding: 28px 20px 0; }

  /* ---------- Header ---------- */
  header{ display:flex; align-items:baseline; justify-content:space-between; gap: 12px; margin-bottom: 22px; }
  .brand{ font-family: Georgia, 'Times New Roman', serif; font-size: 22px; letter-spacing: 0.02em; font-weight: 600; }
  .brand em{ font-style: italic; color: var(--gold); font-weight: 500;}
  #locBtn{
    background: none; border: 1px solid var(--line); color: var(--slate);
    font-size: 12px; padding: 7px 12px; border-radius: 20px; cursor: pointer;
    font-family: 'IBM Plex Mono', monospace; letter-spacing: 0.02em;
  }
  #locBtn:hover{ color: var(--sand); border-color: var(--slate); }
  #locBtn:focus-visible, button:focus-visible, input:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }

  /* ---------- Hero: tonight's swatch ---------- */
  .hero{
    border-radius: 22px;
    position: relative;
    overflow: hidden;
    border: 1px solid var(--line);
    margin-bottom: 18px;
  }
  .hero-swatch{
    position:absolute; inset:0; z-index:0; opacity: 0.9;
  }
  .hero-content{
    position:relative; z-index:1;
    padding: 30px 26px 26px;
    background: linear-gradient(180deg, rgba(8,9,20,0.5) 0%, rgba(8,9,20,0.28) 45%, rgba(8,9,20,0.55) 100%);
    -webkit-backdrop-filter: blur(10px);
    backdrop-filter: blur(10px);
  }
  .eyebrow{ font-family:'IBM Plex Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: 0.14em; color: rgba(245,230,211,0.65); margin-bottom: 6px; }
  .score-row{ display:flex; align-items:flex-end; gap: 14px; margin-bottom: 4px;}
  .score-num{ font-family: Georgia, 'Times New Roman', serif; font-size: 68px; line-height: 0.9; font-weight: 600; color: var(--sand); text-shadow: 0 2px 12px rgba(0,0,0,0.35); }
  .score-label{ font-size: 20px; font-weight: 600; padding-bottom: 8px; color: var(--sand); }
  .hero-sub{ font-size: 14px; color: rgba(245,230,211,0.8); max-width: 46ch; line-height: 1.5; }
  .hero-times{ display:flex; gap: 22px; margin-top: 18px; flex-wrap: wrap; }
  .hero-time-item .k{ font-family:'IBM Plex Mono', monospace; font-size: 11px; text-transform:uppercase; letter-spacing:0.08em; color: rgba(245,230,211,0.55); }
  .hero-time-item .v{ font-family:'IBM Plex Mono', monospace; font-size: 16px; font-weight: 600; color: var(--sand); }

  .toggle-row{ display:flex; gap: 6px; margin-bottom: 16px; }
  .toggle-btn{
    flex:1; padding: 10px; border-radius: 12px; border: 1px solid var(--line);
    background: var(--card); color: var(--slate); font-size: 13px; cursor: pointer;
    font-family: 'IBM Plex Mono', monospace; letter-spacing: 0.03em;
  }
  .toggle-btn.active{ background: var(--sand); color: var(--ink); border-color: var(--sand); font-weight: 600;}

  /* ---------- 7-day strip ---------- */
  .section-title{ font-family: Georgia, serif; font-size: 15px; color: var(--slate); text-transform: uppercase; letter-spacing: 0.1em; margin: 26px 0 12px; }
  .days{ display:flex; gap: 8px; overflow-x: auto; padding-bottom: 6px; scrollbar-width: thin; }
  .day-card{
    flex: 0 0 84px; border-radius: 14px; border: 1px solid var(--line); background: var(--card);
    padding: 12px 8px; text-align:center; cursor: pointer; transition: border-color .15s;
  }
  .day-card.active{ border-color: var(--gold); }
  .day-card .dow{ font-size: 11px; color: var(--slate); font-family:'IBM Plex Mono', monospace; text-transform: uppercase; }
  .day-card .swatch{ width: 100%; height: 36px; border-radius: 8px; margin: 8px 0; }
  .day-card .num{ font-family: Georgia, serif; font-size: 20px; font-weight:600; }

  /* ---------- Detail cards ---------- */
  .grid{ display:grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .card{ border: 1px solid var(--line); background: var(--card); border-radius: 14px; padding: 14px 16px; }
  .card .label{ font-family:'IBM Plex Mono', monospace; font-size: 10.5px; text-transform:uppercase; letter-spacing:0.08em; color: var(--slate); margin-bottom: 6px;}
  .card .value{ font-size: 17px; font-weight: 600; }
  .card .value small{ font-size:12px; font-weight:400; color: var(--slate); }
  .bar{ height: 5px; border-radius: 4px; background: rgba(245,230,211,0.1); margin-top: 8px; overflow:hidden; }
  .bar i{ display:block; height:100%; border-radius:4px; }

  .why{ font-size: 13px; line-height: 1.6; color: var(--slate); border-top: 1px solid var(--line); padding-top: 16px; margin-top: 22px; }
  .why b{ color: var(--sand); }

  footer{ text-align:center; font-size: 11px; color: var(--slate-dim); margin-top: 36px; font-family:'IBM Plex Mono', monospace; }
  footer a{ text-decoration: underline; text-decoration-color: var(--slate-dim); }

  .loading, .err{ text-align:center; padding: 60px 20px; color: var(--slate); font-size: 14px; }
  .err{ color: var(--rose); }

  /* location modal */
  .modal-backdrop{ position:fixed; inset:0; background: rgba(10,11,22,0.7); display:none; align-items:center; justify-content:center; z-index: 50; padding: 20px;}
  .modal-backdrop.open{ display:flex; }
  .modal{ background: var(--ink-2); border: 1px solid var(--line); border-radius: 18px; padding: 22px; width: 100%; max-width: 380px; }
  .modal h3{ margin: 0 0 12px; font-family: Georgia, serif; font-weight: 600; }
  .modal input{
    width:100%; padding: 11px 14px; border-radius: 10px; border: 1px solid var(--line);
    background: rgba(0,0,0,0.2); color: var(--sand); font-size: 14px; margin-bottom: 10px;
  }
  .modal-results{ max-height: 220px; overflow-y: auto; }
  .modal-result{ padding: 10px 12px; border-radius: 8px; cursor: pointer; font-size: 14px; }
  .modal-result:hover{ background: rgba(245,230,211,0.08); }
  .modal-actions{ display:flex; justify-content: space-between; margin-top: 10px; }
  .modal-actions button{
    background:none; border: none; color: var(--slate); font-size: 13px; cursor: pointer; padding: 6px;
  }
  .modal-actions button.gps{ color: var(--gold); }

  @media (max-width: 420px){
    .score-num{ font-size: 54px; }
    .grid{ grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="brand">After<em>glow</em></div>
    <button id="locBtn">···</button>
  </header>

  <div id="app"><div class="loading">Reading the sky…</div></div>

  <footer>
    Built for golden hour. Forecasts via Open&#8209;Meteo · not a substitute for checking the sky yourself.
  </footer>
</div>

<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal">
    <h3>Change location</h3>
    <input type="text" id="locInput" placeholder="City, state, or ZIP" autocomplete="off">
    <div class="modal-results" id="locResults"></div>
    <div class="modal-actions">
      <button class="gps" id="useGps">Use current location</button>
      <button id="closeModal">Cancel</button>
    </div>
  </div>
</div>

<script>
/* ---------------------------------------------------------------------
   Afterglow — sunrise/sunset color-quality forecast
   Data: Open-Meteo (no API key required, CORS-enabled)
   Scoring: heuristic model based on published sunset-photography guidance —
   high-altitude cloud in the 30-70% range catches and scatters color best,
   low/mid cloud blocks the show, and high humidity flattens saturation.
--------------------------------------------------------------------- */

const DEFAULT_LOC = { name: "Willow Spring, NC", lat: 35.5257, lon: -78.6797 };
const $ = (id) => document.getElementById(id);

let state = {
  loc: null,
  daily: null,
  hourly: null,
  activeDay: 0,
  mode: "morning" // or "evening"
};

function loadLoc(){
  try{
    const saved = JSON.parse(localStorage.getItem("afterglow_loc"));
    if(saved && saved.lat) return saved;
  }catch(e){}
  return null;
}
function saveLoc(loc){
  state.loc = loc;
  localStorage.setItem("afterglow_loc", JSON.stringify(loc));
}

async function fetchForecast(loc){
  const params = new URLSearchParams({
    latitude: loc.lat, longitude: loc.lon,
    daily: "sunrise,sunset",
    hourly: "cloud_cover,cloud_cover_low,cloud_cover_mid,cloud_cover_high,relative_humidity_2m,precipitation_probability,visibility",
    timezone: "auto",
    forecast_days: 7
  });
  const url = `https://api.open-meteo.com/v1/forecast?${params}`;
  let res;
  try{
    res = await fetch(url);
  }catch(networkErr){
    throw new Error(`Network request failed (this usually means the browser blocked or couldn't reach the API): ${networkErr.message}`);
  }
  if(!res.ok){
    let detail = "";
    try{ const body = await res.json(); detail = body.reason || JSON.stringify(body); }catch(e){}
    throw new Error(`Open-Meteo returned HTTP ${res.status}${detail ? ": " + detail : ""}`);
  }
  return res.json();
}

async function geocode(query){
  const params = new URLSearchParams({ name: query, count: 6, language: "en", format: "json" });
  const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?${params}`);
  if(!res.ok) throw new Error("Geocode failed");
  const data = await res.json();
  return data.results || [];
}

/* ---------- Scoring ---------- */
function scoreEvent(hourly, idx){
  // idx = the hourly index closest to sunrise/sunset for that day
  if(idx == null || idx < 0 || idx >= hourly.time.length) return null;

  const low  = hourly.cloud_cover_low[idx]   ?? 0;
  const mid  = hourly.cloud_cover_mid[idx]   ?? 0;
  const high = hourly.cloud_cover_high[idx]  ?? 0;
  const hum  = hourly.relative_humidity_2m[idx] ?? 50;
  const precip = hourly.precipitation_probability[idx] ?? 0;

  // High cloud sweet spot centered at 45%, falling off toward 0 and 100
  const highComponent = Math.max(0, 100 - Math.abs(high - 45) * 1.55);
  // Low cloud directly blocks the horizon view — penalize hard
  const lowComponent = Math.max(0, 100 - low * 1.3);
  // Mid cloud moderately blocks
  const midComponent = Math.max(0, 100 - mid * 0.7);
  // Humidity haze flattens color once above ~55%
  const humPenalty = Math.max(0, hum - 55) * 0.6;
  const precipPenalty = precip * 0.5;

  let score = (highComponent * 0.42) + (lowComponent * 0.30) + (midComponent * 0.18) + ((100 - humPenalty) * 0.10);
  score -= precipPenalty * 0.3;
  score = Math.round(Math.max(2, Math.min(98, score)));

  return { score, low, mid, high, hum, precip };
}

function label(score){
  if(score >= 85) return "Epic";
  if(score >= 70) return "Great";
  if(score >= 44) return "Good";
  if(score >= 26) return "Fair";
  return "Flat";
}

function blurb(s, mode){
  const time = mode === "evening" ? "sunset" : "sunrise";
  if(s.score >= 85) return `High cloud sitting right in the sweet spot to catch color, with a clear line to the ${mode === "evening" ? "west" : "east"} horizon. Worth being in position early.`;
  if(s.score >= 70) return `Solid setup for ${time} color — enough high cloud to light up, without much in the way lower down.`;
  if(s.score >= 44) return `Workable but not a sure thing. Cloud cover is a bit heavier than ideal, so color may be short-lived.`;
  if(s.score >= 26) return `Cloud is stacked in a way that'll likely mute the color — low or mid cloud is blocking the direct light.`;
  return `Either a mostly clear sky (little to scatter light off) or heavy cloud blocking the horizon. Not much of a show expected.`;
}

/* ---------- Gradient swatch ---------- */
function swatchGradient(s, mode){
  const t = s.score / 100;
  const warm = mode === "evening"
    ? [`#2b1730`, `#7a2f4a`, `#e8517a`, `#ff6b35`, `#f2b84b`]
    : [`#141b30`, `#3a3560`, `#c76a8a`, `#f2b84b`, `#fce9c9`];
  const flat = [`#1b2030`, `#2a3040`, `#4a5568`, `#6b7686`, `#8892a8`];
  function mix(hexA, hexB, f){
    const a = hexA.match(/\w\w/g).map(h=>parseInt(h,16));
    const b = hexB.match(/\w\w/g).map(h=>parseInt(h,16));
    const c = a.map((v,i)=>Math.round(v + (b[i]-v)*f));
    return `rgb(${c[0]},${c[1]},${c[2]})`;
  }
  const stops = warm.map((w,i)=> mix(flat[i], w, t));
  return `linear-gradient(180deg, ${stops.join(", ")})`;
}
function heroIsDark(s){ return s.score < 44; }

/* ---------- Rendering ---------- */
function fmtTime(iso){
  const d = new Date(iso);
  return d.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
}
function addMinutes(iso, mins){
  return new Date(new Date(iso).getTime() + mins*60000);
}
function fmt(d){
  const dt = (d instanceof Date) ? d : new Date(d);
  return dt.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
}
function nearestHourIdx(hourlyTimes, targetIso){
  const target = new Date(targetIso).getTime();
  let best = 0, bestDiff = Infinity;
  hourlyTimes.forEach((t, i) => {
    const diff = Math.abs(new Date(t).getTime() - target);
    if(diff < bestDiff){ bestDiff = diff; best = i; }
  });
  return best;
}
function parseLocalDate(dateStr){
  // dateStr like "2026-07-07" — parsing this directly with `new Date()` treats it as
  // UTC midnight, which rolls back a day in any timezone behind UTC. Build it from
  // local components instead so "today" always means today.
  const [y, m, d] = dateStr.split("-").map(Number);
  return new Date(y, m - 1, d);
}

/* ---------- Sun position (azimuth) ----------
   NOAA/Meeus low-precision solar position formulas. Good to a fraction of a
   degree, which is plenty for "which way to point the camera." Takes the
   sunrise/sunset instant (as a JS Date) plus lat/lon and returns the compass
   bearing of the sun along the horizon at that moment. */
const D2R = Math.PI / 180, R2D = 180 / Math.PI;
const dsin = d => Math.sin(d * D2R);
const dcos = d => Math.cos(d * D2R);
const dtan = d => Math.tan(d * D2R);
const dasinc = x => Math.asin(Math.max(-1, Math.min(1, x))) * R2D;
const dacosc = x => Math.acos(Math.max(-1, Math.min(1, x))) * R2D;

// Shared low-precision solar position bits (declination + equation of time)
// used by both the azimuth calc and the twilight calc below.
function solarPosition(date){
  const JD = date.getTime() / 86400000 + 2440587.5;
  const T = (JD - 2451545.0) / 36525;

  let L0 = 280.46646 + T * (36000.76983 + T * 0.0003032);
  L0 = ((L0 % 360) + 360) % 360;

  const M = 357.52911 + T * (35999.05029 - 0.0001537 * T);
  const e = 0.016708634 - T * (0.000042037 + 0.0000001267 * T);

  const C = dsin(M) * (1.914602 - T * (0.004817 + 0.000014 * T))
          + dsin(2 * M) * (0.019993 - 0.000101 * T)
          + dsin(3 * M) * 0.000289;

  const trueLong = L0 + C;
  const omega = 125.04 - 1934.136 * T;
  const lambda = trueLong - 0.00569 - 0.00478 * dsin(omega);

  const seconds = 21.448 - T * (46.8150 + T * (0.00059 - T * 0.001813));
  const e0 = 23 + (26 + seconds / 60) / 60;
  const obliqCorr = e0 + 0.00256 * dcos(omega);

  const decl = dasinc(dsin(obliqCorr) * dsin(lambda));

  const y = dtan(obliqCorr / 2) * dtan(obliqCorr / 2);
  const eqTime = 4 * R2D * (
      y * dsin(2 * L0)
      - 2 * e * dsin(M)
      + 4 * e * y * dsin(M) * dcos(2 * L0)
      - 0.5 * y * y * dsin(4 * L0)
      - 1.25 * e * e * dsin(2 * M)
  );

  return { decl, eqTime };
}

function solarAzimuth(date, lat, lon){
  const { decl, eqTime } = solarPosition(date);

  // Note: this assumes the browser's timezone matches the forecast location's
  // timezone (same assumption the rest of the app makes when it does new Date(iso)
  // on Open-Meteo's local-time strings). Fine for "check the sky where I am."
  const utcMinutes = date.getUTCHours() * 60 + date.getUTCMinutes() + date.getUTCSeconds() / 60;
  let trueSolarTime = (utcMinutes + eqTime + 4 * lon) % 1440;
  if (trueSolarTime < 0) trueSolarTime += 1440;

  let hourAngle = trueSolarTime / 4 - 180;
  if (hourAngle < -180) hourAngle += 360;
  if (hourAngle > 180) hourAngle -= 360;

  const zenith = dacosc(dsin(lat) * dsin(decl) + dcos(lat) * dcos(decl) * dcos(hourAngle));
  const cosAz = (dsin(lat) * dcos(zenith) - dsin(decl)) / (dcos(lat) * dsin(zenith));

  let az;
  if (hourAngle > 0) az = (dacosc(cosAz) + 180) % 360;
  else az = (540 - dacosc(cosAz)) % 360;

  return az;
}

function compassDir(deg){
  const dirs = ["N","NNE","NE","ENE","E","ESE","SE","SSE","S","SSW","SW","WSW","W","WNW","NW","NNW"];
  return dirs[Math.round(deg / 22.5) % 16];
}

/* ---------- Civil twilight (first light / last light) ----------
   Same NOAA/Meeus low-precision approach as the azimuth calc above, but
   solved for the moment the sun crosses 6° below the horizon (zenith 96°)
   instead of a known clock time. "dawn" = first light before sunrise,
   "dusk" = last light after sunset. Returns null in the rare case the sun
   doesn't cross that altitude at all that day (deep polar latitudes). */
function civilTwilight(eventDate, lat, lon, which){
  const { decl, eqTime } = solarPosition(eventDate);
  const zenith = 96;
  const cosHA = (dcos(zenith) - dsin(lat) * dsin(decl)) / (dcos(lat) * dcos(decl));
  if (cosHA > 1 || cosHA < -1) return null;
  const ha = dacosc(cosHA);

  const trueSolarTime = which === "dawn" ? (720 - ha * 4) : (720 + ha * 4);
  let utcMinutes = trueSolarTime - eqTime - 4 * lon;
  utcMinutes = ((utcMinutes % 1440) + 1440) % 1440;

  const dayStartUTC = Date.UTC(eventDate.getUTCFullYear(), eventDate.getUTCMonth(), eventDate.getUTCDate());
  return new Date(dayStartUTC + utcMinutes * 60000);
}

/* ---------- Blue hour window ----------
   Morning blue hour sits before sunrise (first light -> sunrise); evening
   blue hour sits after sunset (sunset -> ~35 min later). Shared by render()
   and pickInitialView() so the "which view should be open" logic tracks the
   same window shown on the hero card, not just the bare sunrise/sunset instant. */
function blueHourBounds(sunriseIso, sunsetIso, mode){
  return mode === "evening"
    ? { start: new Date(sunsetIso), end: addMinutes(sunsetIso, 35) }
    : { start: addMinutes(sunriseIso, -35), end: new Date(sunriseIso) };
}

function render(){
  const { daily, hourly, activeDay, mode, loc } = state;
  const app = $("app");
  if(!daily){ app.innerHTML = '<div class="loading">Reading the sky…</div>'; return; }

  const sunrise = daily.sunrise[activeDay];
  const sunset = daily.sunset[activeDay];
  const eventIso = mode === "evening" ? sunset : sunrise;
  const idx = nearestHourIdx(hourly.time, eventIso);
  const s = scoreEvent(hourly, idx);
  if(!s){ app.innerHTML = '<div class="err">Could not compute a forecast for this day.</div>'; return; }

  const gradient = swatchGradient(s, mode);

  const goldenStart = mode === "evening" ? addMinutes(sunset, -60) : sunrise;
  const goldenEnd   = mode === "evening" ? sunset : addMinutes(sunrise, 60);
  const { start: blueStart, end: blueEnd } = blueHourBounds(sunrise, sunset, mode);

  const azimuth = solarAzimuth(new Date(eventIso), loc.lat, loc.lon);
  const azimuthLabel = `${Math.round(azimuth)}° ${compassDir(azimuth)}`;

  const twilight = mode === "evening"
    ? civilTwilight(new Date(sunset), loc.lat, loc.lon, "dusk")
    : civilTwilight(new Date(sunrise), loc.lat, loc.lon, "dawn");
  const twilightLabel = mode === "evening" ? "Last light" : "First light";

  let html = "";

  html += `<div class="hero">
    <div class="hero-swatch" style="background:${gradient}"></div>
    <div class="hero-content">
      <div class="eyebrow">${loc.name} · ${parseLocalDate(daily.time[activeDay]).toLocaleDateString([], { weekday:'long', month:'short', day:'numeric' })}</div>
      <div class="score-row">
        <div class="score-num">${s.score}</div>
        <div class="score-label">${label(s.score)} ${mode === "evening" ? "sunset" : "sunrise"}</div>
      </div>
      <div class="hero-sub">${blurb(s, mode)}</div>
      <div class="hero-times">
        <div class="hero-time-item"><div class="k">${mode === "evening" ? "Sunset" : "Sunrise"}</div><div class="v">${fmtTime(eventIso)}</div></div>
        ${twilight ? `<div class="hero-time-item"><div class="k">${twilightLabel}</div><div class="v">${fmt(twilight)}</div></div>` : ""}
        <div class="hero-time-item"><div class="k">Direction</div><div class="v">${azimuthLabel}</div></div>
        <div class="hero-time-item"><div class="k">Golden hour</div><div class="v">${fmt(goldenStart)}–${fmt(goldenEnd)}</div></div>
        <div class="hero-time-item"><div class="k">Blue hour</div><div class="v">${fmt(blueStart)}–${fmt(blueEnd)}</div></div>
      </div>
    </div>
  </div>`;

  html += `<div class="toggle-row">
    <button class="toggle-btn ${mode==='morning'?'active':''}" data-mode="morning">Sunrise</button>
    <button class="toggle-btn ${mode==='evening'?'active':''}" data-mode="evening">Sunset</button>
  </div>`;

  html += `<div class="section-title">Next 7 days</div><div class="days">`;
  daily.time.forEach((t, i) => {
    const evt = mode === "evening" ? daily.sunset[i] : daily.sunrise[i];
    const j = nearestHourIdx(hourly.time, evt);
    const ds = scoreEvent(hourly, j);
    const dow = i === 0 ? "Today" : parseLocalDate(t).toLocaleDateString([], { weekday: "short" });
    html += `<div class="day-card ${i===activeDay?'active':''}" data-day="${i}">
      <div class="dow">${dow}</div>
      <div class="swatch" style="background:${ds ? swatchGradient(ds, mode) : '#2a3040'}"></div>
      <div class="num">${ds ? ds.score : "–"}</div>
    </div>`;
  });
  html += `</div>`;

  html += `<div class="section-title">Sky breakdown</div>`;
  html += `<div class="grid">
    ${statCard("High cloud", s.high, "%", "Catches & scatters color — 30–60% is ideal", var2color(s.high, 45, 60))}
    ${statCard("Low cloud", s.low, "%", "Blocks the horizon view when high", var2color(s.low, 100, 40, true))}
    ${statCard("Mid cloud", s.mid, "%", "Moderate blocker at higher amounts", var2color(s.mid, 100, 50, true))}
    ${statCard("Humidity", s.hum, "%", "Haze flattens saturation above ~55%", var2color(s.hum, 100, 55, true))}
  </div>`;

  html += `<div class="why"><b>How this is scored</b> — Afterglow weighs high-altitude cloud cover (the layer that catches direct light and turns pink/orange), low and mid cloud (which physically block the view of the horizon or the light source), and humidity (haze mutes saturation even on an otherwise clear evening). It's a heuristic, not a guarantee — always worth a look outside 20 minutes before showtime.</div>`;

  app.innerHTML = html;

  document.querySelectorAll(".toggle-btn").forEach(b => b.addEventListener("click", () => {
    state.mode = b.dataset.mode; render();
  }));
  document.querySelectorAll(".day-card").forEach(b => b.addEventListener("click", () => {
    state.activeDay = parseInt(b.dataset.day); render();
  }));
}

function var2color(val, ref, sweetOrMax, inverse){
  // returns a hex for the bar fill
  let pct;
  if(inverse){ pct = Math.max(0, 100 - (val/ (sweetOrMax||100)) * 100); }
  else{ pct = Math.max(0, 100 - Math.abs(val - sweetOrMax) * 2); }
  if(pct > 66) return "#F2B84B";
  if(pct > 33) return "#E8517A";
  return "#565d78";
}

function statCard(labelText, val, unit, note, color){
  return `<div class="card">
    <div class="label">${labelText}</div>
    <div class="value">${Math.round(val)}${unit} <small>${note}</small></div>
    <div class="bar"><i style="width:${Math.min(100,val)}%; background:${color}"></i></div>
  </div>`;
}

/* ---------- Boot ---------- */
// Default to whichever event (sunrise/sunset) hasn't happened yet, rather
// than always opening to today's sunrise even if it's already evening.
function pickInitialView(daily){
  const now = new Date();
  const morningBlue = blueHourBounds(daily.sunrise[0], daily.sunset[0], "morning");
  const eveningBlue = blueHourBounds(daily.sunrise[0], daily.sunset[0], "evening");
  // Still pre-dawn or in the morning blue hour -> stay on today's sunrise.
  if(now < morningBlue.end) return { activeDay: 0, mode: "morning" };
  // Past morning blue hour but not yet past evening blue hour -> today's sunset.
  if(now < eveningBlue.end) return { activeDay: 0, mode: "evening" };
  // Evening blue hour has wrapped up -> jump to tomorrow's sunrise, if we have it.
  return { activeDay: daily.time.length > 1 ? 1 : 0, mode: "morning" };
}

async function boot(loc){
  state.loc = loc;
  $("app").innerHTML = '<div class="loading">Reading the sky over ' + loc.name + '…</div>';
  try{
    const data = await fetchForecast(loc);
    state.daily = data.daily;
    state.hourly = data.hourly;
    const initial = pickInitialView(data.daily);
    state.activeDay = initial.activeDay;
    state.mode = initial.mode;
    render();
  }catch(e){
    $("app").innerHTML = `<div class="err">Could not load the forecast.<br><span style="font-family:monospace;font-size:12px;opacity:0.8;">${(e && e.message) ? e.message : e}</span></div>`;
  }
}

/* ---------- Location modal ---------- */
const backdrop = $("modalBackdrop");
$("locBtn").addEventListener("click", () => { backdrop.classList.add("open"); $("locInput").focus(); });
$("closeModal").addEventListener("click", () => backdrop.classList.remove("open"));
backdrop.addEventListener("click", (e) => { if(e.target === backdrop) backdrop.classList.remove("open"); });

let searchTimeout;
$("locInput").addEventListener("input", (e) => {
  clearTimeout(searchTimeout);
  const q = e.target.value.trim();
  if(q.length < 2){ $("locResults").innerHTML = ""; return; }
  searchTimeout = setTimeout(async () => {
    try{
      const results = await geocode(q);
      $("locResults").innerHTML = results.map(r =>
        `<div class="modal-result" data-lat="${r.latitude}" data-lon="${r.longitude}" data-name="${r.name}, ${r.admin1 || r.country}">
          ${r.name}${r.admin1 ? ", " + r.admin1 : ""}${r.country ? " — " + r.country : ""}
        </div>`
      ).join("") || '<div class="modal-result" style="cursor:default;color:var(--slate)">No matches</div>';
      document.querySelectorAll(".modal-result[data-lat]").forEach(el => {
        el.addEventListener("click", () => {
          const loc = { name: el.dataset.name, lat: parseFloat(el.dataset.lat), lon: parseFloat(el.dataset.lon) };
          saveLoc(loc);
          backdrop.classList.remove("open");
          boot(loc);
        });
      });
    }catch(err){ $("locResults").innerHTML = '<div class="modal-result" style="cursor:default;color:var(--rose)">Search failed</div>'; }
  }, 350);
});

$("useGps").addEventListener("click", () => {
  if(!navigator.geolocation){ alert("Location services aren't available in this browser."); return; }
  $("useGps").textContent = "Locating…";
  navigator.geolocation.getCurrentPosition(
    (pos) => {
      const loc = { name: "Current location", lat: pos.coords.latitude, lon: pos.coords.longitude };
      saveLoc(loc);
      backdrop.classList.remove("open");
      $("useGps").textContent = "Use current location";
      boot(loc);
    },
    () => { alert("Couldn't get your location — check permissions."); $("useGps").textContent = "Use current location"; },
    { timeout: 8000 }
  );
});

// Init
function initLocation(){
  const saved = loadLoc();
  if(saved){ boot(saved); return; }

  if(!navigator.geolocation){
    boot(DEFAULT_LOC);
    return;
  }
  // No saved location yet — ask for it up front instead of silently defaulting.
  $("app").innerHTML = '<div class="loading">Requesting your location…</div>';
  navigator.geolocation.getCurrentPosition(
    (pos) => {
      const loc = { name: "Current location", lat: pos.coords.latitude, lon: pos.coords.longitude };
      saveLoc(loc);
      boot(loc);
    },
    () => { boot(DEFAULT_LOC); }, // denied, timed out, or unavailable — fall back quietly
    { timeout: 8000 }
  );
}
initLocation();
</script>
